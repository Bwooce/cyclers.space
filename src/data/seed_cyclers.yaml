    e: "Rogers et al. 2012 Table 1: 'VISIT-2 ... Eccentricity: 0.275'."
    perihelion_au: "Rogers et al. 2012 Table 1: 'VISIT-2 ... Perihelion Radius, AU: 0.95'."
    aphelion_au: "Rogers et al. 2012 Table 1: 'VISIT-2 ... Aphelion Radius, AU: 1.67'."
    "period.years": "Rogers 2012 Table 1 footnote a: 7 synodic periods = 14.95 yr."

