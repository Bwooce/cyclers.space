    note: |
      Pre-Aldrin (1985) foundational cycler-class paper. Predates the
      Aldrin SAIC presentation by 15 years and the Byrnes/Longuski/Aldrin
      1993 JSR paper by 23 years. The first peer-reviewed analytical
      demonstration that an Earth-Venus orbit can be made periodic via
      matched-V_inf gravity-assist swing-bys. Title capitalisation
      ("Swing-By") follows the original citation as reproduced in Rogers
      et al. 2012 AIAA 2012-4746 reference [4].
