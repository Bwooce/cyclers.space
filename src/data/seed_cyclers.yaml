# ---------------------------------------------------------------------------
# 38. Arenstorf 1963 — Earth-Moon periodic free-return ("figure-8" /
#     Apollo precursor). CR3BP periodic orbit, NOT patched-conic.
# ---------------------------------------------------------------------------
- id: arenstorf-em-figure8-1963
  name: "Arenstorf periodic Earth-Moon free-return orbit (CR3BP)"
  source: literature
  trajectory_regime: ballistic   # added 2026-06-01; v1 catalogue is ballistic-only; field is explicit for future regime expansion
  primary: "Earth"
  bodies: ["E", "Moon"]
  sequence_canonical: "E-Moon"
  sense: "n/a"
  period:
    pair: "E-Moon"
    k: 1
    years: null
    note: |
      Arenstorf's 1963 paper proves existence of one-parameter analytic
      families of "synodically closed" periodic solutions of the planar
      restricted three-body problem with small mass ratio (Earth-Moon
      mu ≈ 0.012). The closing period for the most-cited member used as
      the Apollo free-return analogue is on the order of one Earth-Moon
      synodic period (~14 d in the spacecraft's frame, or ~6 d in the
      Earth-centered patched-conic projection); the original paper does
      not tabulate a single period because it presents a family. Left
      `years: null` because the catalogue's period convention is
      heliocentric-synodic-multiple and does not naturally express the
      sidereal-lunar / synodic-lunar ambiguity in this CR3BP setting.
  vinf_kms_at_encounters:
    - body: "E"
      vinf_kms: null
      note: |
        The Arenstorf orbit lives in the CR3BP, where the conserved
        quantity is the Jacobi constant, not patched-conic V_infinity.
        Quoting a V_inf at Earth would be model-mismatched. Left null
        with a model-mismatch flag per spec §16.1 honesty rules.
    - body: "Moon"
      vinf_kms: null
      note: "Same as above — Jacobi-constant model, not patched-conic."
  orbit_elements:
    a_au: null
    e: null
    perihelion_au: null
    aphelion_au: null
    inclination_deg: null
    note: |
      Heliocentric Keplerian orbit elements are inapplicable: the
      Arenstorf orbit is a periodic solution in the rotating Earth-Moon
      synodic frame, not a Kepler ellipse around the Sun. Left null
      throughout per honesty rule.
  legs: []
  first_published:
    authors: ["Arenstorf, R. F."]
    year: 1963
    title: "Periodic Solutions of the Restricted Three Body Problem Representing Analytic Continuations of Keplerian Elliptic Motions"
    venue: "American Journal of Mathematics, Vol. 85, No. 1, pp. 27-35"
    date: "1963-01"
    doi: "10.2307/2373181"
    url: "https://www.jstor.org/stable/2373181"
    note: |
      Also issued as NASA Technical Note NASA-TN-D-1859 (May 1963),
      NTRS accession 19630005545, URL
      https://ntrs.nasa.gov/citations/19630005545 . Arenstorf was at
      NASA Marshall Space Flight Center at the time. The Apollo
      programme later adopted free-return trajectories of this family;
      Arenstorf is credited with the rescue trajectory used by Apollo
      13 (secondary attribution).
  corroborating_sources:
    - authors: ["Cook, J. D."]
      year: 2020
      title: "Arenstorf orbit"
      venue: "John D. Cook blog (johndcook.com), 2020-02-08"
      doi: null
      url: "https://www.johndcook.com/blog/2020/02/08/arenstorf-orbit/"
      note: "Modern explainer; useful for the standard mu = 0.012277471 Earth-Moon mass ratio commonly used in numerical CR3BP demos of the Arenstorf orbit."
  priority_date: "1963-01-01"
  notes: |
    MODEL MISMATCH FLAG: this is a CR3BP (circular restricted three-body
    problem) periodic orbit, not a patched-conic + gravity-assist
    cycler. The V_infinity + bend-angle abstraction the rest of this
    catalogue uses does not apply to it. The entry exists for two
    reasons:

      1. Historical / pedagogical priority: Arenstorf 1963 is the
         foundational lunar free-return analytic family; the Apollo
         missions used trajectories of this kind.
      2. Future scope flag: if cyclerfinder ever extends to CR3BP /
         invariant-manifold modelling (see spec §2 stretch goals and
         docs/known-cyclers.md §H), this entry is the first known-prior
         art the matcher would need to handle.

    Until such an extension exists, M7 novelty matching MUST treat any
    finder hit purely on `primary == "Earth"` + bodies ["E", "Moon"] as
    a candidate for human review against this entry rather than an
    automatic prior-art match; the numerical signature comparison the
