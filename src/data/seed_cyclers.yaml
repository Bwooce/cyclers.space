    SnLm TAXONOMY (per Russell 2004 dissertation citation paragraph
    and S1L1 entry context):

      S<n>L<m> where
        n = number of Earth-Mars synodic periods to repeat
        m = number of intermediate Earth-Earth phasing loops
            between successive Mars encounters

