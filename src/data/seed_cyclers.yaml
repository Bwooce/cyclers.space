  model_assumption: circular-coplanar   # schema v2 (2026-06-01); circular-coplanar | analytic-ephemeris | cr3bp; see data/README.md
  delta_v_kms: null   # schema v2; near-ballistic / not-extracted — actual value deferred (per-row Russell ΔV extraction)
  v_infinity_leveraging_dv_kms: null   # schema v2; non-null only for Rogers 2012 establishment variants once their values are extracted
  fleet_size: null   # schema v2; integer count; null where not stated by source
  flyby_mechanics: null   # schema v2; per-encounter turning_angle_deg + min_altitude_km; null = not yet extracted from source
  bodies: ["E", "M"]
  sequence_canonical: "E-E-M-M"   # 2-synodic with intermediate Earth encounter; SnLm = S2L1
  sense: "outbound"
  period:
    pair: "E-M"
    k: 2
    years: 4.27
    note: "Two Earth-Mars synodic periods = 2 x 2.135 yr = 4.27 yr; consistent with the four-vehicle count in Rogers 2012 Table 1 (one vehicle per outbound/inbound branch x 2 synodic phases)."
  vinf_kms_at_encounters:
    - body: "E"
      vinf_kms: null
      note: |
        Steady-state cycling V_inf at Earth not in Rogers 2012 Table 1 (Table 1
        gives orbital elements only). Rogers 2012 Table 3 reports the
        4:3(2)- establishment-cycler V_inf,flyby = 3.378 km/s (the post-Earth
        flyby V_inf for the establishment trajectory matching Case 1's
        orbital elements). McConaghy/Longuski/Byrnes 2002 AIAA 2002-4420
        (paywalled at AIAA) is the originating source for the steady-state
        cycler V_inf; Russell 2004 Table 3.4 does not pair "Case 1" to a
        Russell-numbered row (only Case 2 = 2.1.1.+2 and Case 3 = 2.3.1.+1
        are footnoted).
    - body: "M"
      vinf_kms: null
      note: "Same — steady-state V_inf at Mars not transcribed by Rogers 2012; awaiting direct access to McConaghy 2005 dissertation or AIAA 2002-4420."
  orbit_elements:
    a_au: 1.22
    e: 0.238
    perihelion_au: 0.93
    aphelion_au: 1.51
    inclination_deg: 0.0
    note: "Rogers et al. 2012 Table 1: 'Case 1 ... Semi-Major Axis 1.22 AU, Eccentricity 0.238, Aphelion Radius 1.51 AU, Perihelion Radius 0.93 AU' (circular-coplanar model). 0.0 inclination follows from the modelling assumption."
    periapse_km: null         # schema v2; parallel to perihelion_au for non-Sun primaries; null if not tabulated
