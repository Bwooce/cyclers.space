  priority_date: "1970-10-01"
  notes: |
    Pre-Aldrin foundational paper for ballistic cycler trajectories. First
    peer-reviewed analytical demonstration that a spacecraft can be placed
    on a periodic Earth-Venus orbit, indefinitely shuttling between the
    two planets via matched-V_inf gravity-assist swing-bys. The
    matched-V_inf constraint that defines a ballistic cycler — V_inf
    arrival at planet i must equal V_inf departure from the same planet
    in the cycle — is introduced in this Hollister lineage; later
    Tisserand-graph methods (Strange/Longuski 2002, etc.) formalise
    the geometric/algebraic structure but the constraint itself is
    Hollister's contribution. Russell/Strange 2009 JGCD (entry 42) and
    Rogers et al. 2012 (entry 11, 12) both trace the cycler concept's
    origin to this line of work, not to Aldrin.

    DATA COMPLETENESS: citation-only. Numerical values (k, period
    years, V_inf at Earth and Venus, a, e, perihelion, aphelion) are all
    null because the paper full text was not accessible at ingest:

      - AIAA arc.aiaa.org (DOI 10.2514/3.30134) — HTTP 403 to web-fetch
        tool, consistent with the project-wide AIAA access caveat
        documented in data/README.md "Audit" section.
      - ADS abstract page (1970JSpRo...7.1193H) — fetched empty content.
      - NTRS — no matching record.
      - Google Scholar / search-result snippets — only metadata, not
        numerics.

    The companion Rogers et al. 2012 paper (the catalogue's primary
    secondary source for Hollister-Menning citation, ingested for the
    Aldrin/VISIT/S1L1 entries) cites Hollister-Menning 1970 in the
    lineage paragraph but does not transcribe orbital parameters from
    it. When the paper becomes accessible (a print library copy at MIT,
    where Hollister was based, or an institutional subscriber to AIAA),
    backfill k, years, V_inf, and orbital elements via Edit-with-source-
    quote-update per data/README.md "Editing an existing entry".

    M7 NOTE: a finder hit producing a periodic E-V ballistic cycler
    cannot be matched against this entry via signature comparison
    (signature fields are null). Treat as "candidate-novel, flag for
    human review against Hollister-Menning 1970" until member numerics
    are ingested. Given the paper's vintage and the simplicity of the
    E-V two-body cycler family, any modern enumerator working in the
    circular-coplanar model should rediscover Hollister-Menning's
    solutions; preserve attribution.
  source_quotes:
    "first_published.title": |
      Citation per Rogers, Hughes, Longuski & Aldrin 2012 (AIAA 2012-4746)
      reference [4]: "Hollister, W. and Menning, M., 'Periodic Swing-By
      Orbits between Earth and Venus,' Journal of Spacecraft and Rockets,
      Vol. 7, No. 10, October 1970, pp. 1193-1199."
    "first_published.doi": |
      AIAA DOI registry: doi.org/10.2514/3.30134 resolves to the AIAA
      arc.aiaa.org landing page for "Periodic swing-by orbits between
      earth and Venus" by W. M. Hollister and M. D. Menning, Journal of
      Spacecraft and Rockets Vol. 7 No. 10 (1970) pp. 1193-1199. Title
      capitalisation on the AIAA landing page is sentence-case; the
      Rogers et al. 2012 citation uses title-case ("Swing-By") which is
      the form preserved in this catalogue.
    notes: |
      Rogers et al. 2012 AIAA 2012-4746 Introduction: "In the late 1960s
      and early 1970s, Hollister and Hollister and Menning discovered
      trajectories that use gravity-assists to repeatedly encounter the
      Earth and Venus. Rall and Rall and Hollister were the first to
      show that these types of trajectories also exist between Earth
      and Mars." Conclusion: "The concept of cycler vehicles, which
      would provide safe havens for astronauts traveling to and from
      Mars on repeating trajectories, has been discussed since
      Hollister introduced the idea in 1969."
