# 7. Longuski / Jones-Hernandez-Jesick VEM triple cyclers (family entry)
# ---------------------------------------------------------------------------
# Jones et al. 2017 reports "thousands of previously undocumented two synodic
# period Earth-Mars-Venus triple cyclers". No individual cycler is named or
# tabulated in the abstract / accessible sources, so we capture the family
# as a single seed entry with citation; individual members are TBD pending
# access to the full paper.
- id: jones-2017-vem-triple-family
  name: "Jones/Hernandez/Jesick VEM triple cyclers (family seed entry)"
  source: literature
  bodies: ["V", "E", "M"]
  sequence_canonical: "V-E-M"   # canonical placeholder; actual sequences vary across the family
  sense: "n/a"
  period:
    pair: "E-M"          # primary anchor pair; secondary V-E synodic also relevant
    k: 2                  # "two synodic period" per the abstract
    years: 4.27           # 2 x E-M synodic
    note: |
      Jones et al. 2017 reports "two synodic period Earth-Mars-Venus triple
      cyclers" (= 2 x 2.135 yr ≈ 4.27 yr, anchored on the E-M synodic).
      Spec.md §3 references a different VEM beat period: "the natural beat
      is ≈ 6.4 yr (3 x E-M ≈ 4 x E-V)". The 6.4-yr beat is a NECESSARY
      condition for closure but not the only possible period; Jones et al.
      2017 find 2-synodic E-M solutions that incorporate Venus flybys.
  vinf_kms_at_encounters:
    - body: "V"
      vinf_kms: null
      note: "Family-level entry — individual member V_inf values are in the full Jones 2017 paper which is not freely accessible online (NTRS metadata-only)."
    - body: "E"
      vinf_kms: null
      note: |
        Abstract reports "numerous solutions are identified with average transit
        leg excess speed below 5 km/sec, independent of encounter epoch."
        That is an *average* — individual encounter V_inf values not in the
        abstract.
    - body: "M"
      vinf_kms: null
      note: "Same: average transit leg V_inf below 5 km/s per the abstract; individual values TBD."
  orbit_elements:
    a_au: null
    e: null
    perihelion_au: null
    aphelion_au: null
    inclination_deg: null
    note: "Triple cyclers traverse a wider Tisserand graph region; no single (a, e) characterises the family. Individual members would have their own elements."
  legs: []
  first_published:
    authors: ["Jones, D. R.", "Hernandez, S.", "Jesick, M."]
    year: 2017
    title: "Low Excess Speed Triple Cyclers of Venus, Earth, and Mars"
    venue: "AAS/AIAA Astrodynamics Specialist Conference, Stevenson WA, AAS Paper 17-577 (JPL-CL#17-3322)"
    date: "2017-08-20"
    doi: null
    url: "https://ntrs.nasa.gov/citations/20190028464"
    note: |
      "hdl:2014/46418" is the JPL Open Repository handle for the report.
      The paper is the first published account of ballistic VEM triple
      cyclers. The Longuski group has subsequent related work but this is
      the priority publication.
  priority_date: "2017-08-20"
  notes: |
    Per the abstract: "Ballistic cycler trajectories which repeatedly encounter
    Earth and Mars may be invaluable to a future transportation architecture
    ferrying humans to and from Mars. Such trajectories which also involve at
    least one flyby of Venus are computed here for the first time."

    Web search snippet: "The paper discovered thousands of previously
    undocumented two synodic period Earth-Mars-Venus triple cyclers, with
    many solutions identified having average transit leg excess speed below
    5 km/sec, independent of encounter epoch."

    This entry is INTENTIONALLY a family/placeholder. As individual members
    are tabulated (from the full Jones 2017 paper or follow-up work) they
    should be added as separate entries with their own canonical signatures.
    Until then, M7 novelty matching against this entry should be treated as
    "candidate-novel if no exact match, but flagged for human review against
    the Jones 2017 paper" rather than auto-tagging as known.

    Caveat about the spec §16.4's mention of "Longuski et al. (2017) Low
    Excess Speed Triple Cyclers": the actual primary authors are Jones,
    Hernandez, Jesick (all JPL), not Longuski. Longuski is the Purdue
    advisor of multiple cited co-authors (McConaghy, Landau, Yam, Chen, ...)
    but is not a Jones 2017 author. The spec's attribution should be
    corrected in a future revision.
