    JSR "Towards a Standard Nomenclature for Earth-Mars Cycler
    Trajectories"), the "U" prefix is the up-escalator branch indicator;
    "0L1" indicates zero intermediate Earth-Earth loops and one synodic
    period to repeat. U0L1 is the most propulsion-expensive of the
    cyclers in Rogers 2012 Table 2 (direct LEO DV 8.052 km/s) but also
    enjoys the largest absolute mass savings from V_inf leveraging
    (45.8 mt per Rogers Table 6) — a useful test case for V_inf
