      content cited below comes from the NTRS landing page.
  corroborating_sources:
    - authors: ["Genova, A. L."]
      year: 2016
      title: "Circumlunar Free-Return Cycler Orbits for a Manned Earth-Moon Space Station"
      venue: "NTRS 20160004674"
      doi: null
      url: "https://ntrs.nasa.gov/citations/20160004674"
      note: "Companion / follow-up report from the same author covering the same orbit family."
  priority_date: "2015-08-09"
  notes: |
    Buzz Aldrin's lunar-cycler extension of his Earth-Mars cycler
    concept. Co-authored with NASA Ames trajectory analyst Anthony L.
    Genova. The orbit is "free-return" in the sense that any spacecraft
    flying on it will naturally return to Earth without propulsion;
    "modest phasing maneuvers" (average 39 m/s per month per the
    abstract) compensate for solar-gravity perturbations and keep the
    geometry repeating.

    Useful as a destination for crew transfer: per the abstract, lunar
    encounters "offer the chance for a smaller craft to depart the
    cycler and enter lunar orbit, or head for a Lagrange point (e.g.,
    EM-L2 halo orbit), distant retrograde orbit (DRO), or interplanetary
    destination such as a near-Earth object (NEO) or Mars."

    MODEL NOTE: like the Arenstorf entry, this is best modelled in the
    Earth-Moon CR3BP with solar-perturbation third-body, not in
    patched-conic + V_infinity. The numerical signature fields are
    largely null and should not be used for M7 novelty matching against
    heliocentric finder hits.
  source_quotes:
    "first_published.title": |
      NTRS 20150018049 title: "A Free-Return Earth-Moon Cycler Orbit
      for an Interplanetary Cruise Ship" — Genova, Aldrin.
    "legs[0].tof_days": |
      NTRS abstract: "introducing solar gravity and modest phasing
      maneuvers (average of 39 m/s per month) which yields close-Earth
      encounters every 7 or 10 days."
    "legs[1].tof_days": |
      NTRS abstract: "Lunar encounters occur every 26 days and offer
      the chance for a smaller craft to depart the cycler and enter
      lunar orbit..."
    notes: |
      NTRS abstract: "introducing solar gravity and modest phasing
      maneuvers (average of 39 m/s per month)" (delta-V budget cited
      in notes).

