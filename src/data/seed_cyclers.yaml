    - authors: ["McConaghy, T. T."]
      year: 2005
      title: "Design and optimization of interplanetary spacecraft trajectories"
      venue: "Ph.D. dissertation, School of Aeronautics and Astronautics, Purdue University; ProQuest / Purdue e-Pubs AAI3166673"
      doi: null
      url: "https://docs.lib.purdue.edu/dissertations/AAI3166673/"
      note: "Comprehensive dissertation; not directly consulted at ingest (Purdue docs.lib not reachable via WebFetch; ProQuest dissertation full text behind subscription). Cycler chapters subsume the AIAA 2002-4420 broad-class enumeration and the JSR 2004 paper."
    - authors: ["Rogers, B. A.", "Hughes, K. M.", "Longuski, J. M.", "Aldrin, B."]
      year: 2012
      title: "Preliminary Analysis of Establishing Cycler Trajectories Between Earth and Mars via V-Infinity Leveraging"
      venue: "AIAA 2012-4746"
      doi: "10.2514/6.2012-4746"
      url: "https://engineering.purdue.edu/AAC/wp-content/uploads/2012/09/EstablishingCyclerTrajectoriesBetweenEarthAndMarsViaV-InfinityLeveraging-AIAA-2012-47461.pdf"
      note: "Table 1 row 'Case 1' is the source of the orbital elements used here. Table 4 STOUR analytic-ephemeris establishment-cycler entry gives the 365-day Earth-to-Mars time-of-flight; Table 3 genetic-algorithm row 4:3(2)- Case 1 reports V_inf flyby of 3.300-3.378 km/s for the establishment trajectory."
  priority_date: "2002-08-05"
  notes: |
    "Case 1" is the third (alongside Case 2 and Case 3) of the two-synodic-
    period ballistic cyclers tabulated in McConaghy/Longuski/Byrnes 2002
    AIAA 2002-4420 and the Byrnes/McConaghy/Longuski 2002 AIAA 2002-4423
    follow-on ("Analysis of Various Two Synodic Period Earth-Mars Cycler
    Trajectories"). The SnLm classification is S2L1: 2 synodic periods,
    1 intermediate Earth-Earth loop between Mars encounters. Russell
    2004 Table 3.4 footnotes only Cases 2 (= Russell 2.1.1.+2) and 3 (=
    Russell 2.3.1.+1) to Byrnes 2002; Case 1 is not footnoted to a
    specific Russell row in the dissertation excerpt visible from the
    UT Austin abstract page, but it shares the same generic family.

    Among the four McConaghy-Byrnes-Longuski 2002 two-synodic-period
    cyclers, Rogers 2012 §III.A flags Case 2 as having the lowest
    launch V_inf and shortest 171-day Earth-Mars flight time in
    the analytic ephemeris (Table 4). Case 1 has the longest first-leg
    ToF (365 d, Rogers Table 4) — implying the spacecraft completes
    roughly one full heliocentric orbit before reaching Mars on its
    first leg, distinguishing it geometrically from Cases 2/3.

    DATA COMPLETENESS: orbital elements (a, e, peri, apo) populated
    from Rogers 2012 Table 1. Steady-state cycling V_inf values left
    null pending direct access to McConaghy 2005 dissertation or the
    AIAA 2002-4420 / JSR 2004 papers. M7 matching against finder hits
    can use the orbital-element signature without the V_inf multiset.

    The 4:3(2)- prefix in Rogers 2012 Tables 3-5 refers to the
    V_inf-leveraging K:L(M)+/- notation introduced in their Nomenclature
    table: K = number of Earth orbit revolutions, L = number of
    spacecraft orbit revolutions, M = spacecraft orbit revolution on
    which the deep-space maneuver is performed, with +/- denoting
    flyby before (-) or after (+) perihelion. This is a separate
    nomenclature from McConaghy's SnLm cycler classification.
  source_quotes:
    a_au: "Rogers et al. 2012 Table 1: 'Case 1 ... Semi-Major Axis, AU: 1.22'."
    e: "Rogers et al. 2012 Table 1: 'Case 1 ... Eccentricity: 0.238'."
    perihelion_au: "Rogers et al. 2012 Table 1: 'Case 1 ... Perihelion Radius, AU: 0.93'."
    aphelion_au: "Rogers et al. 2012 Table 1: 'Case 1 ... Aphelion Radius, AU: 1.51'."
