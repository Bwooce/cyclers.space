# ===========================================================================
# Russell 2004 dissertation Chapter 4 tables — 2026-06-01
# ===========================================================================
# These entries catalogue Russell 2004's *generalised* nomenclature
# (`<a_max_ssm>.<NNN><sequence-letters><synodic-count>`) covering ballistic
# and near-ballistic Earth-Mars cyclers with period up to 3 synodic periods,
# enumerated by minimax-Lambert global search. The naming is documented at
# /tmp/russell-2004.txt line 7375: "The first number is the simple model
# Earth hyperbolic excess speed, and the last number indicates the simple
# model repeat time in the synodic periods. The sequence of letters in
# between indicate the type and order of the free-returns".
#
# Chapter 4 nomenclature DIFFERS from Chapter 3's `p.h.s.i` convention used
# in earlier russell-ocampo-* entries.
#
# ID convention: `russell-ch4-<russell-code>`. Spaces and special chars in
# the Russell code are preserved verbatim.
#
# The McConaghy 2006 'Notable' cycler (entry 2 mcconaghy-2006-em-k2) is
# the same trajectory as Russell row 4.991gG2 in Table 4.9. Both entries
# remain in the catalogue; M7 collapses them via canonical signature.
# ===========================================================================

# ---------------------------------------------------------------------------
# Russell 2004 Table 4.9 — Ballistic two-synodic period cyclers
# ---------------------------------------------------------------------------
- id: russell-ch4-4.991gG2
  name: "Russell-Ocampo cycler 4.991gG2 (= McConaghy/Longuski/Byrnes 'S1L1' / 'Notable', two-synodic ballistic)"
  source: literature
  trajectory_regime: ballistic
  model_assumption: circular-coplanar   # schema v2 (2026-06-01); circular-coplanar | analytic-ephemeris | cr3bp; see data/README.md
  delta_v_kms: 0.0   # derived from Russell 2004 AR/TR via M2 surrogate; see source_quotes
  v_infinity_leveraging_dv_kms: null   # schema v2; non-null only for Rogers 2012 establishment variants once their values are extracted
  fleet_size: null   # schema v2; integer count; null where not stated by source
  flyby_mechanics: null   # schema v2; per-encounter turning_angle_deg + min_altitude_km; null = not yet extracted from source
  bodies: ["E", "M"]
  sequence_canonical: "E-E-M-M"   # one intermediate Earth encounter + Mars per cycle
  sense: "outbound"
  period:
    pair: "E-M"
    k: 2
    years: 4.27
    note: "2-synodic E-M cycler per Russell 2004 Table 4.9 row 1. Russell footnote 'a' = 'documented in Ref. 15' (McConaghy/Longuski/Byrnes AIAA 2002-4420)."
  vinf_kms_at_encounters:
    - body: "E"
      vinf_kms: 4.99
      note: "Russell 2004 Table 4.9 row 1, column v_inf E (km/s) = 4.99. Cycler code 4.991gG2 leads with this value (the '4.991' prefix in the parent-cycler list, Table 5.5, dissertation line 7512)."
    - body: "M"
      vinf_kms: 5.10
      note: "Russell 2004 Table 4.9 row 1, column v_inf M (km/s) = 5.10."
  orbit_elements:
    a_au: null
    e: null
    perihelion_au: null
    aphelion_au: 1.64
    inclination_deg: 0.0
    note: |
      Russell 2004 Table 4.9 row 1 tabulates aphel = 1.64 AU. (a, e, peri)
      are null because the cycler is a piecewise sequence of two generic-
      return arcs (the leg descriptors are g(1.4612,526.02,Ll) +
      G(2.8096,651.46,U)), not a single Keplerian ellipse — each leg has
      its own (a, e). Only the maximum aphelion is well-defined for the
      cycler as a whole.
    periapse_km: null         # schema v2; parallel to perihelion_au for non-Sun primaries; null if not tabulated
    apoapse_km: null          # schema v2; parallel to aphelion_au for non-Sun primaries
    raan_deg: null            # schema v2; right ascension of ascending node (Ω); null for current entries
    arg_periapsis_deg: null   # schema v2; argument of periapsis (ω); null for current entries
    true_anomaly_deg: null    # schema v2; true anomaly at epoch (ν); null for current entries
    epoch_iso8601: null       # schema v2; ISO-8601 epoch for the anomaly; null = generic
  legs:
    - from: "E"
      to: "M"
      tof_days: 150
      n_revs: 0
      note: "Russell 2004 Table 4.9 row 1: t_out = 150 days. Designated leg is the second one G(2.8096,651.46,U) per Russell's convention (uppercase = leg used to compute Mars v_inf and t_out)."
    - from: "M"
      to: "E"
      tof_days: 150
      n_revs: 0
      note: "Russell 2004 Table 4.9 row 1: t_in = 150 days (symmetric). Generic-return arcs are symmetric, so t_in = t_out always for this row."
  first_published:
    authors: ["McConaghy, T. T.", "Longuski, J. M.", "Byrnes, D. V."]
    year: 2002
    title: "Analysis of a Broad Class of Earth-Mars Cycler Trajectories"
    venue: "AIAA/AAS Astrodynamics Specialist Conference, AIAA 2002-4420"
    doi: "10.2514/6.2002-4420"
    url: null
  corroborating_sources:
    - authors: ["McConaghy, T. T.", "Landau, D. F.", "Yam, C. H.", "Longuski, J. M."]
      year: 2006
      title: "Notable Two-Synodic-Period Earth-Mars Cycler"
      venue: "Journal of Spacecraft and Rockets, Vol. 43, No. 2, pp. 456-465"
      doi: "10.2514/1.15215"
      note: "The 'Notable' paper. Catalogue entry 2 (mcconaghy-2006-em-k2) carries the McConaghy-convention attribution of the same cycler with V_inf 4.7/5.0 km/s and 153-d ToF (realistic-ephemeris optimised) vs Russell's 4.99/5.10 and 150 d (circular-coplanar simple model)."
    - authors: ["Russell, R. P."]
      year: 2004
      title: "Global Search and Optimization for Free-Return Earth-Mars Cyclers"
      venue: "PhD dissertation, UT Austin"
      doi: null
      url: "http://hdl.handle.net/2152/1253"
      note: "Table 4.9 row 1; parent cycler 4.991gG2 (#83). Cross-reference to McConaghy 'S1L1' at dissertation lines 7416, 5476, 8008."
  priority_date: "2002-08-05"
  notes: |
    SUPERSEDES NUMERICALLY (for orbital/V_inf data) catalogue entry 2
    (mcconaghy-2006-em-k2) — same physical cycler, different
    nomenclature framing. Both entries preserved: entry 2 carries the
    McConaghy SnLm-convention citation (V_inf 4.7/5.0 from the JSR
    paper's realistic-ephemeris optimisation, 153-d ToF), this entry
    carries Russell's circular-coplanar simple-model values from Table
    4.9 (V_inf 4.99/5.10, 150-d ToF, aphel 1.64 AU).

    Discrepancy analysis:
    - V_inf E: McConaghy 2006 = 4.7 vs Russell 2004 = 4.99 (Δ = 0.29 km/s)
    - V_inf M: McConaghy 2006 = 5.0 vs Russell 2004 = 5.10 (Δ = 0.10 km/s)
    - E-M ToF: McConaghy 2006 = 153 d vs Russell 2004 = 150 d (Δ = 3 d)

    The most plausible explanation per Russell's own text (dissertation
    line 7416): McConaghy 2006 reports ephemeris-optimised values for a
    realistic launch, while Russell Table 4.9 reports the circular-
    coplanar simple-model reference values. Russell explicitly states
    this cycler "is essentially ballistic for all launch dates. This
    is consistent with the findings in Ref. 15" (McConaghy 2002 et al).

    M7 canonical-signature matching tolerances should be wide enough
    (~0.5 km/s on V_inf, ~10 d on ToF) to collapse these two entries
    under one signature. The leg-descriptor "g(1.4612,526.02,Ll)
    G(2.8096,651.46,U)" — generic return Ll patched with generic return
    U — is the unique structural fingerprint.

    Russell's Chapter 5 parent-cycler list (Table 5.5, line 7512) gives
    a 7-cycle realistic-ephemeris optimisation result for #83 4.991gG2:
    launch Jun-25, total delta-V = 0 m/s, avg E-M transit 165 d, avg
    V_inf E = 5.37, avg V_inf M = 5.48 km/s. These are different again
    from both the McConaghy 2006 abstract values and the Table 4.9
    simple-model values — they characterise the ephemeris-optimal
    trajectory, not the simple-model parent.
  source_quotes:
    delta_v_kms: "Derived from Russell 2004's tabulated AR / TR via the M2 powered-flyby surrogate (src/cyclerfinder/core/flyby.py): ΔV ≈ (V∞_E + V∞_M) × max(0, 1 − TR) + (1 − AR) × (V∞_E + V∞_M) × 0.025 [AR-correction term active only when AR < 1]. Upper bound; biases near-ballistic entries toward 'requires nudge'. Strict-ballistic rows (AR ≥ 1 AND TR ≥ 1) give ΔV = 0 exactly. AR/TR primary values: Russell 2004 Table 4.9 row 1 (4.991gG2): aphel=1.64 AU, TR=2.65, v∞E=4.99, v∞M=5.10."
    "vinf_kms_at_encounters[0].vinf_kms": |
      Russell 2004 dissertation Table 4.9 (page 127), row 1: column
      "v_inf E (km/s)" = 4.99. Confirmed by parent-cycler code
      "4.991gG2" (dissertation Table 5.5 line 7512, Appendix C line 8600).
    "vinf_kms_at_encounters[1].vinf_kms": |
      Russell 2004 Table 4.9 row 1, column "v_inf M (km/s)" = 5.10.
    "legs[0].tof_days": |
      Russell 2004 Table 4.9 row 1, column "t_out (days)" = 150.
    "legs[1].tof_days": |
      Russell 2004 Table 4.9 row 1, column "t_in (days)" = 150 (symmetric
      with t_out for generic-return cyclers).
    "orbit_elements.aphelion_au": |
      Russell 2004 Table 4.9 row 1, column "aphel. (AU)" = 1.64.
    "period.years": |
      Derived: 2 x Earth-Mars synodic period 2.135 yr = 4.27 yr. Russell
      dissertation does not separately tabulate the cycler period in
      years; the "2" suffix in 4.991gG2 indicates 2 synodic periods per
      Russell §4.7 and §5.5 (dissertation line 7375).
    name: |
      Russell 2004 dissertation line 7416: "cycler 4.991gG2(#83) ...
      Also known as the 'S1L1' cycler". Line 5476: "notable 'S1L1'
      cycler ... discovered first by McConaghy et al. in Ref. 15".
      Line 8008: "the S1L1 cycler (4.991Gg2), 8.049gGf2, and the
      Aldrin cycler".

