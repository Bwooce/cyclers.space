# ---------------------------------------------------------------------------
# Russell 2004 Table 3.4 lists 44 cyclers; 24 are strictly ballistic
# (AR >= 1.0 AND TR >= 1.0 — Russell's two footnotes a/b: 'Cycler reaches Mars
# if Aphelion Ratio >= 1' and 'All flybys have minimum altitudes above 200 km
# if Turn Ratio >= 1'). Of those 24 strictly-ballistic cyclers, two
# (2.5.1.+0 and 3.1.2.+1) are already seeded above as §4 representatives;
# the remaining 22 are added here so the catalogue covers the full strictly-
# ballistic set Russell catalogued. Source: Russell 2004 dissertation Table 3.4,
# extracted from the UT Austin handle 2152/1253 PDF.
#
# NOTE: four of the catalogue's earlier-numbered Russell-Ocampo entries
# (1.0.1.-1 = Aldrin, 2.1.1.+2 = Byrnes 'Case 2', 2.3.1.+1 = Byrnes 'Case 3',
# 4.3.1.-5 = near-Hohmann) appear in Russell Table 3.4 but do NOT satisfy the
# strict AR>=1 AND TR>=1 ballistic criterion. They are retained in the
# catalogue for historical/notable reasons (Aldrin's namesake; Byrnes-attributed
# 'Case' labels; Russell's §3.8 'remarkably low energy' highlight). Russell
# includes them in the table under the wider ARMIN=0.9, TRMIN=0.85 limits.

