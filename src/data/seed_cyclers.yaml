# NON-HELIOCENTRIC ENTRIES (added 2026-05-31)
# Schema extension: each entry below carries an explicit `primary:` field.
# Existing heliocentric entries 1-37 above omit `primary:` and consumers
# must default it to "Sun" per data/README.md "Schema (extended)".
