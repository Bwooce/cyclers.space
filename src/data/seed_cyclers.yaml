    inclination_deg: 0.0
    note: "Per Rogers et al. 2012 Table 1 (citation: Niehoff via McConaghy/Longuski/Byrnes 2002 p. 6). NB Wikipedia gives different aphelion 1.89 AU for VISIT-1 and 1.45 AU for VISIT-2 — that pair seems to come from a different VISIT table (possibly Friedlander 1986). The Rogers 2012 numbers are taken as authoritative here because they come from a single internally-consistent table. See known-cyclers.md outstanding question §C."
