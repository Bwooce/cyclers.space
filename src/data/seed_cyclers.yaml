    url: null
    note: "First publication of the broad-class enumeration that includes Case 1. The journal version is McConaghy/Longuski 2004 JSR 'Analysis of a Class of Earth-Mars Cycler Trajectories' (DOI 10.2514/1.11939, paywalled). The comprehensive dissertation treatment is McConaghy 2005 Purdue PhD."
