    periapse_km: null         # schema v2; parallel to perihelion_au for non-Sun primaries; null if not tabulated
    apoapse_km: null          # schema v2; parallel to aphelion_au for non-Sun primaries
    raan_deg: null            # schema v2; right ascension of ascending node (Ω); null for current entries
    arg_periapsis_deg: null   # schema v2; argument of periapsis (ω); null for current entries
    true_anomaly_deg: null    # schema v2; true anomaly at epoch (ν); null for current entries
    epoch_iso8601: null       # schema v2; ISO-8601 epoch for the anomaly; null = generic
  legs:
    - from: "E"
      to: "M"
      tof_days: 154
      n_revs: 0
      note: "Per Mistree/Kornfeld 2019 (cited via search) and Spreen et al. 2020 'Design Considerations for an Earth-Mars Cycler Spacecraft Using the S1L1 Cycler': 'a nominal 154-day trajectory'. NB Russell 2004 Table 4.9 has the McConaghy 2006 'notable' variant at t_out=150 d; the 154-d figure is for the S1L1 specifically."
  first_published:
    authors: ["McConaghy, T. T.", "Longuski, J. M.", "Byrnes, D. V."]
    year: 2002
    title: "Analysis of a Broad Class of Earth-Mars Cycler Trajectories"
    venue: "AIAA/AAS Astrodynamics Specialist Conference, Monterey CA, AIAA 2002-4420"
    doi: "10.2514/6.2002-4420"
    url: null
    note: "S1L1 nomenclature originates with McConaghy/Russell/Longuski's standard nomenclature paper (ref [25] in Russell 2004); the S1L1 cycler itself is one entry in the broader class catalogued by McConaghy/Longuski/Byrnes 2002 (Russell 2004 ref [17])."
  corroborating_sources:
