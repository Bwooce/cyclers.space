    requirements at Earth and Mars" because "the generic return portion of
    this cycler is very near a Hohman transfer". The aphelion ratio of 0.992
    means it just barely doesn't reach Mars's circular orbit in the simplified
    model, so it's TECHNICALLY classed as "near-ballistic" in Russell's
    taxonomy — but in the real ephemeris model with Mars's eccentric orbit
