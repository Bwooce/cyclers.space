    with no intermediate Earth-Mars-Earth loops in the SnLm sense, but
    S1L1 has L=1 (one intermediate Earth-Earth loop) and aphelion ~1.64
    AU just inside Mars's orbit, whereas U0L1 has L=0 (zero intermediate
    Earth loops) and aphelion 3.20 AU far beyond Mars. The "U" prefix
    distinguishes the up-escalator (outbound-to-Mars) branch from the
    down-escalator (inbound-to-Earth) branch on the same family.
