    encountering Earth twice in three Earth years and Mars five times in four
    Mars years." Rogers 2012's (a, e, peri, apo) numbers imply orbital period
    P = 2pi*sqrt(a^3/mu_sun) ≈ 1.50 yr, consistent.

    Same source-mismatch caveats as VISIT-1 apply.
