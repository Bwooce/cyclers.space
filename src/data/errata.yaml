# Assumed-errata ledger (task #228) — validated against data/errata.schema.json
# by tests/data/test_errata.py.
#
# This project reproduces published cycler-trajectory values as part of its
# golden-test discipline. The entries below are printed values our reproductions
# or internal-consistency checks indicate are defective AS PRINTED. They are
# ASSUMED errata: every reasoning field is a falsifiable argument the original
# authors can check, and we would welcome verification, correction, or refutation
# (all entries start status: open). Unresolved entries are explicitly questions.
#
# Citation rule: doi_or_url is publication-level only (DOI / arXiv / publisher or
# author page). Evidence refs point only at this public repository's docs/notes/,
# tests/, and src/ trees plus adjudication commit SHAs.

- id: vallado-tr916-stumpff-z-neg39p47842
  paper: >-
    Vallado, D. A., "Methods of Astrodynamics, A Computer Approach", Version 3.0,
    USAFA Technical Report TR-91-6, U.S. Air Force Academy, 1991 (DTIC AD-A239 662).
  doi_or_url: "https://apps.dtic.mil/sti/citations/ADA239662"
  location: "Appendix E, FindCandS Stumpff-function table, z = -39.47842 row (p. E-12)"
  printed_value: "C = 5.83559577, S = 0.97444596"
  derived_value: "C = 6.75677528, S = 1.05406777"
  reasoning: >-
    The printed C and S for z = -39.47842 appear inconsistent with the standard
    Stumpff definitions (for z < 0: C(z) = (1 - cosh sqrt(-z))/z and
    S(z) = (sinh sqrt(-z) - sqrt(-z))/(-z)^(3/2)). We derive
    C = 6.75677528, S = 1.05406777 three independent ways — the project's
    universal-variable implementation, a direct power-series evaluation, and the
    closed cosh/sinh forms — all agreeing to better than 1e-9, and no nearby z
    reproduces both printed values simultaneously. The page was re-read
    character-by-character twice; the printed z itself is -39.47842 (not
    mis-printed), and the other four rows of the same table (z = 0, 0.57483,
    39.47842, 50.0) reproduce to <= 4e-9. We would welcome correction if a
    different Stumpff convention explains the printed pair. EXTERNAL
    CONFIRMATION (2026-06-13): the author's own current code release
    ("Fundamentals of Astrodynamics and Applications" 5th-ed companion,
    github.com/CelesTrak/fundamentals-of-astrodynamics, findc2c3) evaluated at
    z = -39.47842 returns C = 6.756775284482481, S = 1.0540677718375635 —
    bit-identical to our derived values, agreeing with this erratum and not
    with the 1991 print.
  evidence_refs:
    - "docs/notes/2026-06-12-load-bearing-numbers-verification.md (HEADLINE item 1 + PDF ADJUDICATION item 1)"
    - "docs/notes/2026-06-10-vallado-1991-tr916-mining.md (section 4.1 correction block)"
    - "tests/core/test_vallado_goldens.py (module-docstring DO-NOT-USE record, item 1)"
    - "commit f4138d8 (PDF adjudication)"
    - "tests/core/test_vallado_code_oracle.py (author-code external confirmation)"
    - "commit 5208a2a (oracle adjudication)"
  confidence: confirmed-in-print
  affected_catalogue_rows: []
  vor_status: final-form
  status: open

