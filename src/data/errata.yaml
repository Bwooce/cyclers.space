  paper: >-
    Ellison, D. H., Conway, B. A., Englander, J. A., and Ozimek, M. T.,
    "Analytic Gradient Computation for Bounded-Impulse Trajectory Models Using
    Two-Sided Shooting", Journal of Guidance, Control, and Dynamics, Vol. 41,
