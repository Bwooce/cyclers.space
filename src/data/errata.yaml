- id: mcconaghy-2004-table71-tail
  paper: >-
    McConaghy, T. T., "Design and Optimization of Interplanetary Spacecraft
    Trajectories", Ph.D. dissertation, Purdue University, December 2004
    (UMI/ProQuest no. 3166673).
  doi_or_url: "https://docs.lib.purdue.edu/dissertations/AAI3166673/"
  location: >-
    Chapter 7, Table 7.1 (Outbound Cycler Vehicle 1, p. 148), encounters 20-24
    (Mars-20 2031-07-15 through Earth-24 2038-05-06), V-infinity and
    closest-approach columns
  printed_value: >-
    V-infinity 7.85 / 4.21 / 4.20 / 5.87 / 7.23 km/s; closest approach
    8,802 / 24,870 / 2,756 / 1,770 / (blank) km, against Table 7.1's own
    printed encounter dates
  derived_value: >-
    Table 7.5 (p. 159) prints, for encounter dates identical to the printed day,
    V-infinity 7.70 / 3.78 / 3.76 / 4.68 / 5.54 km/s and closest approaches
    10,573 / 22,970 / 9,633 / 15,695 km; a DE440 per-leg reproduction from
    Table 7.1's own dates emerges Table 7.5's values
  reasoning: >-
    Tables 7.1 and 7.5 print encounter dates identical to the printed day from
    Earth-3 through Earth-22, yet from Mars-20 they print incompatible
    V-infinity and closest-approach values. Identical dates force the same
    Lambert conics (the discrete alternative conics are 6.7-16.3 km/s apart), so
    both tails cannot be right for these dates — Table 7.1's tail is internally
    inconsistent with the table's own dates and times of flight. Our DE440
    reproduction of the full 24-encounter itinerary from Table 7.1's printed
    dates reproduces rows 1-19 cleanly and emerges Table 7.5's values for the
    tail, as does the independent Russell 2004 Appendix C itinerary that overlaps
    these dates. Our transcription of both tables was re-read
    character-by-character against the page (image and embedded text layer
    agree). Whether the production error sits in Table 7.1's date column or its
    V-infinity/closest-approach columns is unresolvable from the print alone —
    a question we would welcome the author's input on.
  evidence_refs:
    - "docs/notes/2026-06-10-mcconaghy-2004-dissertation-mining.md (section 2.2 VERIFICATION block, #193)"
    - "docs/notes/2026-06-10-mcconaghy-table71-reproduction.md (DE440 reproduction + section 9 adjudication)"
    - "commit a8c0928 (#193 adjudication)"
  confidence: provable-internal-inconsistency
  affected_catalogue_rows: []
  vor_status: final-form
  status: open

