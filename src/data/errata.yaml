  doi_or_url: "https://doi.org/10.2514/1.G003077"
  location: >-
    Appendix, Eqs. A1-A6 (gradients of the Eq. 4 flyby minimum-altitude
    constraint w.r.t. the v-infinity vectors)
  printed_value: >-
    Each printed term carries an additional 1/r_periapse factor (A1-A3 and the
    first terms of A4-A6) or 1/r_flyby factor (final terms of A4-A6) relative to
    the gradient of Eq. 4 as printed
  derived_value: >-
    The unscaled gradient d(c_alt)/d(v-infinity) of Eq. 4 (units km per km/s);
    the printed expressions match it term by term — same numerator vectors, same
    cos(acos(alpha)/2), (alpha - 1), and power factors — except for the extra
    radius factors
  reasoning: >-
    The printed appendix gradients appear to be of an r-scaled
    (nondimensionalised) form of the Eq. 4 constraint rather than of Eq. 4 as
    printed — and the scaling radius is printed inconsistently between terms of
    the same gradient (1/r_periapse in some terms, 1/r_flyby in others), so as
    printed the expressions are not the gradient of any single scaling of Eq. 4
    and are dimensionally inconsistent with it. Our unscaled implementation of
    d(c_alt)/d(v-infinity) matches the printed expressions term by term once the
    extra radius factors are removed, and validates against central differences
    — the paper's own recommended verification pattern for derivative code
    (Sec. VI). The paper prints no unit-level numeric gradient values, so a
    direct numeric check against the print is not possible; we would welcome the
    authors' statement of the intended constraint scaling.
