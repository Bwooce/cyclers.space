- id: shakouri-2019-unresolved-cells
  paper: >-
    Shakouri, A., Kiani, M., and Pourtakdoust, S. H., "A New Shape-Based
    Multiple-Impulse Strategy for Coplanar Orbital Maneuvers",
    arXiv:1905.04543v1 [math.OC], 2019 (preprint submitted to Acta Astronautica).
  doi_or_url: "https://arxiv.org/abs/1905.04543"
  location: >-
    Table 2 (p. 14) and Table 3 (p. 18): the 1-Impulse row; the Remark-2.7 row's
    t_f cell; the 2-Impulse Lambert (b) rows; and the t_f = 3570 s cell of
    Table 3's 7.9455 km/s optimum
  printed_value: >-
    (a) Table 2, 1-Impulse row: J_c = 2.6305 km/s, coast times 2631 / 3463 s;
    (b) Table 2, 2-Impulse (Remark 2.7) row: t_f = 2315 s;
    (c) Tables 2-3, 2-Impulse Lambert (b) rows: 1.4677 / 0.7831 km/s (case 1)
    and 2.5604 / 1.3344 km/s (case 2);
    (d) Table 3: t_f = 3570 s for the 7.9455 km/s cell
  derived_value: >-
    Our reproductions: (a) single-impulse cost 2.7864 km/s at BOTH orbit
    intersections (true anomaly 120/240 deg), coast times 4039 / 14623 s;
    (b) the transfer is a half revolution of the a_2 = 10317 km intermediate
    ellipse, half-period 5214 s; (c) with the departure point fixed at
    theta_12 our optimum is 1.93 km/s, and with the departure anomaly also free
    our optima fall BELOW the printed values (1.337 / 0.782; 2.508 / 1.283 km/s);
    (d) our minimiser of the impulse sum sits at t_f ~= 5126 s, and our
    J_c(3570 s) = 8.2459 km/s
  reasoning: >-
    These cells are open QUESTIONS for the authors, not claimed errata: our
    reproductions disagree with the printed values, but we hold no
    internal-consistency proof and a convention difference may explain them.
    Specifically we would ask: (a) under what geometry does the 1-Impulse row
    reach J_c = 2.6305 km/s with coast times 2631 / 3463 s? No interpretation we
    tried (either omega sign convention, either coast direction, time measured
    from perigee) reproduces the printed row, and the same row's orbits
    intersect where our single-impulse cost is 2.7864 km/s. (b) How is the
    Remark-2.7 transfer time t_f = 2315 s defined, given the closed-form
    transfer is a half revolution of the intermediate ellipse (half-period
    5214 s) and the row's J_c / J_m cells reproduce exactly? (c) What feasible
    set defines the Lambert (b) rows ("allows the spacecraft to remain in its
    initial orbit before applying the first impulse", p. 12)? With the departure
    fixed we land above the printed optima and with it free we land below them.
    (d) For Table 3's 7.9455 km/s value (see the label-swap entry), is the
    printed t_f = 3570 s a typo? Our minimiser of the impulse sum sits near
    5126 s. The reproduction code paths are public and we would welcome
    correction of any mistaken assumption on our side.
