name: Refresh windows

on:
  schedule:
    - cron: '17 3 * * 1'    # weekly: 03:17 UTC every Monday
  workflow_dispatch:

permissions:
  contents: write           # needs to commit the regenerated JSON
  pull-requests: write      # falls back to PR if direct push fails
  actions: write            # needs to trigger deploy.yml after auto-commit

concurrency:
  group: refresh-windows
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'  # cyclerfinder pyproject pins >=3.11,<3.12
      - name: Install deps
        run: |
          # cyclerfinder pulls astropy + scipy + numpy + jplephem transitively.
          pip install pyyaml
          pip install git+https://github.com/Bwooce/cyclers.git@main
      - name: Sync catalogue from upstream
        run: |
          # Fetch the canonical seed catalogue from the main cyclers repo.
          # Hard rule: catalogue is source-of-truth at Bwooce/cyclers; this
          # repo carries a refreshed copy. Upstream is public, so no token
          # is needed; if it ever moves private again the curl below will
          # 404 and the workflow will fail loud rather than silently using
          # stale data.
          curl -fsSL https://raw.githubusercontent.com/Bwooce/cyclers/main/data/seed_cyclers.yaml \
            -o src/data/seed_cyclers.yaml
      - name: Recompute windows (real ephemeris via phase_match)
        # Reads seed_cyclers.yaml, calls cyclerfinder.search.phase_match
        # for each ballistic Earth-touching cycler, writes windows.json
        # with real JPL DE440 dates + actual Lambert V_inf per window.
        run: python scripts/compute_windows.py
      - name: Commit if changed
        id: commit
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add src/data/seed_cyclers.yaml src/data/windows.json
            git commit -m "refresh: synced catalogue + recomputed encounter schedules (auto)"
            git push
            echo "committed=true" >> $GITHUB_OUTPUT
          else
            echo "No catalogue or window changes; nothing to commit."
            echo "committed=false" >> $GITHUB_OUTPUT
          fi
      - name: Trigger deploy
        # Auto-commits made with the default GITHUB_TOKEN do not trigger
        # downstream push-listening workflows (GitHub Actions
        # loop-prevention). Without this step the catalogue auto-syncs
        # every Monday but the site never redeploys. Explicit
        # workflow_dispatch on deploy.yml bypasses the loop-prevention.
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref main
